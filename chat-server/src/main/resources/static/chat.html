<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>채팅 테스트</h2>

<input type="text" id="sender" placeholder="이름">
<input type="text" id="message" placeholder="메시지">
<button onclick="send()">전송</button>

<ul id="chat"></ul>

<script>

    let stompClient = null;

    function connect() {

        let socket = new SockJS("/ws-chat");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            stompClient.subscribe('/sub/chat', function (msg) {

                let data = JSON.parse(msg.body);

                let li = document.createElement("li");
                li.innerText = data.sender + " : " + data.message;

                document.getElementById("chat").appendChild(li);
            });

        });

    }

    function send() {

        let sender = document.getElementById("sender").value;
        let message = document.getElementById("message").value;

        stompClient.send("/pub/chat.send", {}, JSON.stringify({
            sender: sender,
            message: message
        }));

    }

    connect();

</script>

</body>
</html>
